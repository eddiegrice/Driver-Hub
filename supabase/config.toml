
[functions.traffic-receiver]
enabled = true
verify_jwt = true
import_map = "./functions/traffic-receiver/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/traffic-receiver/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/traffic-receiver/*.html" ]

[functions.ticketmaster-events]
enabled = true
verify_jwt = true
entrypoint = "./functions/ticketmaster-events/index.ts"

[functions.sportsdb-events]
enabled = true
# Cron / server invokes often use service_role only; false avoids JWT edge cases on invoke.
verify_jwt = false
entrypoint = "./functions/sportsdb-events/index.ts"
