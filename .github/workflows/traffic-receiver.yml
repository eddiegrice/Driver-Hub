# Run the Traffic Scotland DATEX II receiver on a schedule so the app always has fresh data.
# Add these secrets in GitHub: repo → Settings → Secrets and variables → Actions:
#   TRAFFIC_SCOTLAND_CLIENT_ID
#   TRAFFIC_SCOTLAND_CLIENT_KEY
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY

name: Traffic receiver

on:
  schedule:
    # Every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allow manual run from Actions tab

jobs:
  run-receiver:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and run receiver
        env:
          TRAFFIC_SCOTLAND_CLIENT_ID: ${{ secrets.TRAFFIC_SCOTLAND_CLIENT_ID }}
          TRAFFIC_SCOTLAND_CLIENT_KEY: ${{ secrets.TRAFFIC_SCOTLAND_CLIENT_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd scripts/traffic-receiver
          npm install
          node index.js
